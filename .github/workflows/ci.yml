name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools
        # Only lint/test tools are needed: the pure functions under test import
        # nothing beyond the standard library, so we skip the heavy deps
        # (torch/whisper) for a fast, reliable CI.
        run: pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q
